services:
  
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:youshallnotpass@postgres:5432/osu
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
  
  redis:
    image: redis:latest
  
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: youshallnotpass
      POSTGRES_DB: osu
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: